services:

  postgres:
    image: postgres:16
    container_name: hotel_postgres
    restart: always
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hotel_user -d hotel_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel_backend
    restart: always
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://hotel_user:hotel_pass@postgres:5432/hotel_db
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://basedatoscliente.izzycorporation.com/api}
    container_name: hotel_frontend
    restart: always
    ports:
      - "5175:5175"
    depends_on:
      - backend

volumes:
  postgres_data:
